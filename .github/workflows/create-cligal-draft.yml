name: Create Cligal Draft Invoice

on:
  workflow_dispatch:
    inputs:
      client_name:
        description: 'Client name for the invoice'
        required: true
      amount:
        description: 'Invoice amount (number, no currency sign)'
        required: true
      description:
        description: 'Description / bank memo'
        required: false
        default: ''
      draft_date:
        description: 'Invoice date YYYY-MM-DD (defaults to today)'
        required: false
        default: ''

jobs:
  create-draft:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: scripts/package.json

      - name: Install dependencies
        working-directory: scripts
        run: npm ci

      - name: Install Playwright browsers
        working-directory: scripts
        run: npx playwright install chromium --with-deps

      - name: Create draft invoice in Cligal
        working-directory: scripts
        env:
          CLIGAL_EMAIL:      ${{ secrets.CLIGAL_EMAIL }}
          CLIGAL_PASSWORD:   ${{ secrets.CLIGAL_PASSWORD }}
          APP_URL:           ${{ secrets.APP_URL }}
          CRON_SECRET:       ${{ secrets.CRON_SECRET }}
          DRAFT_CLIENT_NAME: ${{ inputs.client_name }}
          DRAFT_AMOUNT:      ${{ inputs.amount }}
          DRAFT_DESCRIPTION: ${{ inputs.description }}
          DRAFT_DATE:        ${{ inputs.draft_date }}
        run: node create-cligal-draft.js

      - name: Upload debug screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cligal-draft-debug-${{ github.run_id }}
          path: scripts/debug-draft-*.png
          if-no-files-found: ignore
          retention-days: 3
