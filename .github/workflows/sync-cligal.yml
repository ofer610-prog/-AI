name: Sync Cligal Invoices

on:
  schedule:
    # Every 6 hours — keeps invoices fresh throughout the workday
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      debug:
        description: 'Enable debug screenshots'
        required: false
        default: 'false'
        type: boolean

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.3

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install
        working-directory: scripts

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps
        working-directory: scripts

      - name: Run Cligal scraper
        env:
          CLIGAL_EMAIL: ${{ secrets.CLIGAL_EMAIL }}
          CLIGAL_PASSWORD: ${{ secrets.CLIGAL_PASSWORD }}
          APP_URL: ${{ secrets.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: node scrape-cligal.js
        working-directory: scripts

      - name: Upload debug screenshots
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v7.0.1
        with:
          name: debug-screenshots
          path: scripts/debug-*.png
          retention-days: 7
          if-no-files-found: ignore
